---
# yamllint disable rule:line-length
docker:
  image: maxonfjvipon/rultor-image-hs:master
  as_root: true
architect:
  - maxonfjvipon
  - yegor256
assets:
  hackage-auth: maxonfjvipon/secrets#.hackage-auth
install: |
  cabal --version
  ghc --version
  cabal update
  pdd -f /dev/null -v
release:
  pre: false
  script: |
    [[ "${tag}" =~ ^0\.[0-9]+\.[0-9]+$ ]] || exit -1
    sed -i "s/^version: 0\.0\.0$/version: ${tag}/" phino.cabal
    chmod 755 ../hackage-auth
    cabal check
    make binary
    cabal test
    git commit -am "set version to ${tag}"
    cabal sdist
    cabal upload --token=$(cat ../hackage-auth) --publish dist-newstyle/sdist/phino-${tag}.tar.gz
merge:
  script: |-
    make -j
