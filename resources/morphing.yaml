---
# Morphing 𝕄 — applied top-to-bottom, first matching clause wins. It is binary,
# 𝕄(n, e): n is the term being morphed and e is the fixed global universe,
# threaded unchanged through every recursive call and substituted for Φ by the
# 'root' rule (Φ, rendered Q, is just the locator of e). The first argument is
# always a normal form: a non-NF expression matches no clause. 𝕄 navigates a
# normal form to a formation one operation at a time, resolving Φ against e and
# peeling dispatches and applications through normalization 𝒩. It never fires a
# bare atom: a saturated λ-formation is returned untouched and fired later by 𝔼
# (the 'fire' rule of 𝔻).
#
# Each rule is an inference rule: 'match' under universe 'e-result' yields the
# conclusion 'n-result' (a premise meta or a literal), provided 'when' holds and
# the ordered 'premises' reduce as stated. A premise binds 'n-result' to the
# result of one judgment — 𝕄 ('morph'), 𝒩 ('normalize') or 𝔼 ('lambda').
#
# 'lambda' and 'dispatch' are kept mutually exclusive: 'dispatch' fires only
# when its head 𝑛 is not a formation ('not (formation 𝑛)'), so every formation
# head — λ-bearing or not — is left to 'lambda' (and 'prim'). The two clauses
# are disjoint and their relative order does not change behavior.

- name: prim
  label: prim
  match: ⟦𝐵⟧
  e-result: 𝑒
  n-result: ⟦𝐵⟧

- name: lambda
  label: \lambda
  match: '⟦𝐵1, λ ⤍ 𝐹, 𝐵2⟧.𝜏'
  e-result: 𝑒
  n-result: 𝑛3
  premises:
    - n-result: 𝑛1
      lambda: '⟦𝐵1, λ ⤍ 𝐹, 𝐵2⟧'
    - n-result: 𝑛2
      normalize: '𝑛1.𝜏'
    - n-result: 𝑛3
      e-result: 𝑒
      morph: 𝑛2

- name: dispatch
  label: disp
  match: '𝑛.𝜏'
  e-result: 𝑒
  n-result: 𝑛3
  when:
    not:
      formation: 𝑛
  premises:
    - n-result: 𝑛1
      e-result: 𝑒
      morph: 𝑛
    - n-result: 𝑛2
      normalize: '𝑛1.𝜏'
    - n-result: 𝑛3
      e-result: 𝑒
      morph: 𝑛2

- name: application
  label: app
  match: '𝑛(𝜏 ↦ 𝑒1)'
  e-result: 𝑒
  n-result: 𝑛3
  premises:
    - n-result: 𝑛1
      e-result: 𝑒
      morph: 𝑛
    - n-result: 𝑛2
      normalize: '𝑛1(𝜏 ↦ 𝑒1)'
    - n-result: 𝑛3
      e-result: 𝑒
      morph: 𝑛2

- name: applicationa
  label: appa
  match: '𝑛(α𝑖 ↦ 𝑒1)'
  e-result: 𝑒
  n-result: 𝑛3
  premises:
    - n-result: 𝑛1
      e-result: 𝑒
      morph: 𝑛
    - n-result: 𝑛2
      normalize: '𝑛1(α𝑖 ↦ 𝑒1)'
    - n-result: 𝑛3
      e-result: 𝑒
      morph: 𝑛2

- name: root
  label: root
  match: Φ
  e-result: 𝑒
  n-result: 𝑛2
  when:
    not:
      eq:
        - 𝑒
        - Φ
  premises:
    - n-result: 𝑛1
      normalize: 𝑒
    - n-result: 𝑛2
      e-result: 𝑒
      morph: 𝑛1

- name: dead
  label: dead
  match: ⊥
  e-result: 𝑒
  n-result: ⊥

- name: xi
  label: xi
  match: ξ
  e-result: 𝑒
  n-result: ⊥

- name: globe
  label: globe
  match: Φ
  e-result: 𝑒
  n-result: ⊥
