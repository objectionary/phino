---
# Morphing 𝕄 — applied top-to-bottom, first matching clause wins. It is binary,
# 𝕄(n, e): n is the term being morphed and e is the fixed global universe,
# threaded unchanged through every recursive call and substituted for Φ by the
# 'root' rule (Φ, rendered Q, is just the locator of e). The first argument is
# always a normal form: a non-NF expression matches no clause. 𝕄 navigates a
# normal form to a formation one operation at a time, resolving Φ against e and
# peeling dispatches and applications through normalization 𝒩. It never fires a
# bare atom: a saturated λ-formation is returned untouched and fired later by 𝔼
# (the 'fire' rule of 𝔻).
#
# 'lambda' and 'dispatch' are kept mutually exclusive: 'dispatch' fires only
# when its head 𝑛 is not a formation ('not (formation 𝑛)'), so every formation
# head — λ-bearing or not — is left to 'lambda' (and 'prim'). The two clauses
# are disjoint and their relative order does not change behavior.

- name: prim
  description: '𝕄(⟦𝐵⟧, e) ⟿ ⟦𝐵⟧'
  match: ⟦𝐵⟧
  then: ⟦𝐵⟧

- name: lambda
  label: \lambda
  description: '𝕄(⟦𝐵1, λ ⤍ 𝐹, 𝐵2⟧.τ, e) ⟿ 𝕄(𝒩(𝔼(⟦𝐵1, λ ⤍ 𝐹, 𝐵2⟧).τ), e)'
  match: '⟦𝐵1, λ ⤍ 𝐹, 𝐵2⟧.𝜏'
  where:
    - meta: 𝑒1
      function: lambda
      args:
        - '⟦𝐵1, λ ⤍ 𝐹, 𝐵2⟧'
  then:
    morph:
      normalize: '𝑒1.𝜏'

- name: dispatch
  description: '𝕄(n.τ, e) ⟿ 𝕄(𝒩(𝕄(n, e).τ), e)'
  match: '𝑛.𝜏'
  where:
    - meta: 𝑒1
      function: morph
      args:
        - 𝑛
  when:
    not:
      formation: 𝑛
  then:
    morph:
      normalize: '𝑒1.𝜏'

- name: application
  description: '𝕄(n(τ ↦ e_1), e) ⟿ 𝕄(𝒩(𝕄(n, e)(τ ↦ e_1)), e)'
  match: '𝑛(𝜏 ↦ 𝑒1)'
  where:
    - meta: 𝑒2
      function: morph
      args:
        - 𝑛
  then:
    morph:
      normalize: '𝑒2(𝜏 ↦ 𝑒1)'

- name: applicationa
  description: '𝕄(n(α_i ↦ e_1), e) ⟿ 𝕄(𝒩(𝕄(n, e)(α_i ↦ e_1)), e)'
  match: '𝑛(α𝑖 ↦ 𝑒1)'
  where:
    - meta: 𝑒2
      function: morph
      args:
        - 𝑛
  then:
    morph:
      normalize: '𝑒2(α𝑖 ↦ 𝑒1)'

- name: root
  description: '𝕄(Φ, e) ⟿ 𝕄(𝒩(e), e), unless e is Φ'
  match: Φ
  when:
    not:
      eq:
        - 𝑒
        - Φ
  then:
    morph:
      normalize: 𝑒

- name: dead
  description: '𝕄(⊥, e) ⟿ ⊥'
  match: ⊥
  then: ⊥

- name: xi
  description: '𝕄(ξ, e) ⟿ ⊥'
  match: ξ
  then: ⊥

- name: globe
  description: '𝕄(Φ, e) ⟿ ⊥ when the universe e is Φ itself'
  match: Φ
  then: ⊥
