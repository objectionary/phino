# Morphing 𝕄 — applied top-to-bottom, first matching clause wins.

- name: prim
  description: A primitive expression morphs to itself
  match: 𝑒
  when:
    primitive: 𝑒
  then: 𝑒

- name: nmz
  description: A reducible expression morphs by normalizing it first
  match: 𝑒
  where:
    - meta: 𝑛
      function: normalize
      args:
        - 𝑒
  when:
    not:
      eq:
        - 𝑒
        - 𝑛
  then:
    morph: 𝑛

- name: lambda
  description: A formation with a λ asset morphs by applying the atom to its bindings
  match: '⟦𝐵1, λ ⤍ !F, 𝐵2⟧ * !t'
  where:
    - meta: 𝑒
      function: lambda
      args:
        - '⟦𝐵1, λ ⤍ !F, 𝐵2⟧'
  then:
    morph: '𝑒 * !t'

- name: phi
  description: A dispatch on the global object morphs to the bound expression
  match: 'Φ.𝜏 * !t'
  where:
    - meta: 𝑒
      function: global
      args:
        - 𝜏
  then:
    morph: '𝑒 * !t'

- name: stuck
  description: Any other expression morphs to termination
  match: 𝑒
  then: ⊥
