---
# Dataization 𝔻 — applied top-to-bottom, first matching clause wins. It is
# binary, 𝔻(n, e): the second argument e is the global universe, the same
# expression that 𝕄 takes as its second argument; 𝔻 forwards it to 𝕄. The first
# argument is always a normal form: a non-NF expression matches no clause.
#
# Each rule is an inference rule: 'match' yields the conclusion 'd-result' (a
# premise bytes meta or a literal), provided 'when' holds and the ordered
# 'premises' reduce as stated. A premise binds its 'n-result'/'d-result' to one
# judgment — 𝔻 ('dataize'), 𝕄 ('morph'), 𝒩 ('normalize'), 𝔼 ('lambda') or
# 𝒞 ('contextualize'). The universe e is the fixed second argument of 𝔻 and 𝕄,
# never a result, so it is not spelled out per rule.

- name: delta
  label: \Delta
  match: ⟦𝐵1, Δ ⤍ δ, 𝐵2⟧
  d-result: δ

- name: box
  label: box
  match: ⟦𝐵1, φ ↦ 𝑒1, 𝐵2⟧
  d-result: δ1
  when:
    disjoint:
      - [Δ, λ]
      - [𝐵1, 𝐵2]
  premises:
    - n-result: 𝑛1
      contextualize:
        - 𝑒1
        - ⟦𝐵1, φ ↦ 𝑒1, 𝐵2⟧
    - n-result: 𝑛2
      normalize: 𝑛1
    - d-result: δ1
      dataize: 𝑛2

- name: fire
  label: fire
  match: ⟦𝐵1, λ ⤍ 𝐹, 𝐵2⟧
  d-result: δ1
  premises:
    - n-result: 𝑛1
      lambda: ⟦𝐵1, λ ⤍ 𝐹, 𝐵2⟧
    - n-result: 𝑛2
      normalize: 𝑛1
    - d-result: δ1
      dataize: 𝑛2

- name: none
  label: none
  match: ⟦𝐵⟧
  d-result: '--'

- name: bott
  label: bott
  match: ⊥
  d-result: '--'

- name: norm
  label: norm
  match: 𝑛
  d-result: δ1
  premises:
    - n-result: 𝑛1
      morph: 𝑛
    - d-result: δ1
      dataize: 𝑛1
