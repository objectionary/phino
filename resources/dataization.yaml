---
# Dataization 𝔻 — applied top-to-bottom, first matching clause wins.

- name: delta
  description: '𝔻(⟦𝐵1, Δ ⤍ δ, 𝐵2⟧) ⟿ δ'
  match: ⟦𝐵1, Δ ⤍ δ, 𝐵2⟧
  then: δ

- name: box
  description: '𝔻(⟦𝐵1, φ ↦ e, 𝐵2⟧) ⟿ 𝔻(𝒞(e)) if [Δ, λ] ∩ (𝐵1 ∪ 𝐵2) = ∅'
  match: ⟦𝐵1, φ ↦ 𝑒, 𝐵2⟧
  where:
    - meta: 𝑒1
      function: contextualize
      args:
        - 𝑒
        - ⟦𝐵1, φ ↦ 𝑒, 𝐵2⟧
  when:
    disjoint:
      - [Δ, λ]
      - [𝐵1, 𝐵2]
  then:
    dataize: 𝑒1

- name: norm
  description: '𝔻(e) ⟿ 𝔻(𝕄(e)) if e ∉ 𝒫'
  match: 𝑒
  where:
    - meta: 𝑒1
      function: morph
      args:
        - 𝑒
  when:
    not:
      primitive: 𝑒
  then:
    dataize: 𝑒1

- name: none
  description: '𝔻(e) ⟿ nothing otherwise'
  match: 𝑒
  then: nothing
