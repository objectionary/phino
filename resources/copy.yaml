---
name: copy
pattern: ⟦ 𝐵1, 𝜏1 ↦ ∅, 𝐵2 ⟧(𝜏1 ↦ 𝑒1)
result: ⟦ 𝐵1, 𝜏1 ↦ 𝑒3, 𝐵2 ⟧
when:
  and:
    - xi: 𝑒1
    - nf: 𝑒1
where:
  - meta: 𝑒2
    function: scope
    args:
      - 𝑒1
  - meta: 𝑒3
    function: contextualize
    args:
      - 𝑒1
      - 𝑒2
