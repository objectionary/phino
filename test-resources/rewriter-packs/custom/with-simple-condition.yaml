---
input: Q -> [[x -> $.q, y -> Q.a]].x
output: |-
  Φ ↦ ⟦
    x ↦ ξ.q,
    y ↦ Φ.a
  ⟧.φ.x
rules:
  custom:
    - name: with-simple-condition
      pattern: '[[!B0]].!a0'
      result: '[[!B0]].@.!a0'
      when:
        and:
          - in:
              - '!a0'
              - '!B0'
          - in:
              - 'y'
              - '!B0'
