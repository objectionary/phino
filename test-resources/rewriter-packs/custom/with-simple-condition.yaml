---
input: Q -> [[x -> $.q, y -> Q.a]].x
output: |-
  Φ ↦ ⟦
    x ↦ ξ.q,
    y ↦ Φ.a
  ⟧.φ.x
rules:
  custom:
    - name: with-simple-condition
      match: '[[!B]].!t'
      result: '[[!B]].@.!t'
      when:
        and:
          - in:
              - '!t'
              - '!B'
          - in:
              - 'y'
              - '!B'
