---
input: Q -> [[x -> $.q, z -> Q.a]]
output: |-
  Φ ↦ ⟦
    z ↦ Φ.a
  ⟧
rules:
  custom:
    - name: with-eq-condition
      pattern: '[[!a1 -> $.q, !a2 -> !e0, !B0]]'
      result: '[[!a2 -> !e0, !B0]]'
      when:
        and:
          - eq:
              - '!a1'
              - 'x'
          - not:
              eq:
                - '!a2'
                - 'y'
