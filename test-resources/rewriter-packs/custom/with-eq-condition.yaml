---
input: Q -> [[x -> $.q, z -> Q.a]]
output: |-
  Φ ↦ ⟦
    z ↦ Φ.a
  ⟧
rules:
  custom:
    - name: with-eq-condition
      pattern: '[[!t1 -> $.q, !t2 -> !e, !B]]'
      result: '[[!t2 -> !e, !B]]'
      when:
        and:
          - eq:
              - '!t1'
              - 'x'
          - not:
              eq:
                - '!t2'
                - 'y'
