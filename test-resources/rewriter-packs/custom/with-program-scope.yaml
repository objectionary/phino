---
input: Q -> [[ y -> Q.x, x -> ? ]](x -> $)
output: |-
  Φ ↦ ⟦
    y ↦ Φ.x,
    x ↦ ⟦⟧
  ⟧
rules:
  custom:
    - name: with-program-scope
      pattern: '[[ !B0, !a0 -> ?, !B1 ]](!a0 -> !e0)'
      result: '[[ !B0, !a0 -> !e2, !B1 ]]'
      where:
        - meta: '!e1'
          function: scope
          args: ['!e0']
        - meta: '!e2'
          function: contextualize
          args: ['!e0', '!e1']
