---
input: Q -> [[ x -> ? ]](~0 -> Q.y)
output: 'Φ ↦ ⟦ x ↦ ∅ ⟧(~0 ↦ Φ)'
rules:
  custom:
    - name: with-alpha-index
      match: '[[ !B ]](α𝑖 ↦ !e)'
      result: '[[ !B ]](α𝑖 ↦ Φ)'
      when:
        eq:
          - 𝑖
          - 0
