---
input: |
  {⟦ x -> "foo" ⟧}
output: |-
  {⟦ x -> "foo", foo -> ⟦⟧ ⟧}
rules:
  custom:
    - name: attribute from string
      pattern: |
        [[ x -> !e0 ]]
      result: |
        [[ x -> !e0, !a0 -> [[ ]], ^ -> ? ]]
      where:
        - meta: '!a0'
          function: tau
          args: ['!e0']
