---
input: |
  {⟦ x -> "foo" ⟧}
output: |-
  {⟦ x -> "foo", a🌵0 -> ⟦⟧ ⟧}
rules:
  custom:
    - name: append fresh tau
      pattern: |
        [[ x -> !e ]]
      result: |
        [[ x -> !e, !a -> [[ ]], ^ -> ? ]]
      where:
        - meta: '!a'
          function: random-tau
