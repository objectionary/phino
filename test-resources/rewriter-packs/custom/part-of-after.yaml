---
repeat: 10
input: Q -> [[ x -> Q.y ]]
output: |-
  Φ ↦ ⟦
    x ↦ Φ.y,
    z -> "hello world"
  ⟧
rules:
  custom:
    - name: part-of-after
      pattern: '[[ x -> Q.y, !B0 ]]'
      result: '[[ x -> Q.y, z -> !e0, !B0 ]]'
      where:
        - meta: '!e0'
          function: concat
          args: ['"hello "', '"world"']
      having:
        not:
          part-of: ['!e0', '!B0']
