---
input: '[[x -> [[a -> Q.z]], y -> [[b -> $.w]], L> Func ]].x'
output: |-
  ⟦
    a ↦ Φ.z,
    ρ ↦ ∅,
    y ↦ ⟦
      b ↦ ξ.w
    ⟧,
    λ ⤍ Func
  ⟧
rules:
  custom:
    - name: with-complex-condition
      pattern: '[[ !t -> [[!B1]], !B2, ρ ↦ ∅ ]].!t'
      result: '[[ !B1, !B2 ]]'
      when:
        and:
          - in:
              - 'a'
              - '!B1'
          - or:
              - in:
                  - 'Δ'
                  - '!B2'
              - in:
                  - 'λ'
                  - '!B2'
