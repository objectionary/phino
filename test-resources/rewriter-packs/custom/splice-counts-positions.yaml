---
input: |
  Q -> [[
    cps -> [[
      a -> [[ @ ->Q.hone.emit ]],
      x -> [[ @ ->Q.jeo.opcode.iconst_0 ]],
      b -> [[ @ ->Q.hone.emit ]],
      y -> [[ @ ->Q.jeo.opcode.iconst_1 ]],
      c -> [[ @ ->Q.hone.emit ]]
    ]],
    auto -> [[
      r1 -> [[ @ ->Q.jeo.opcode.iadd ]],
      r2 -> [[ @ ->Q.jeo.opcode.istore ]]
    ]]
  ]]
output: |-
  Φ ↦ ⟦
    n ↦ 11
  ⟧
rules:
  custom:
    - name: splice and count
      pattern: '[[ cps -> [[ !B-cps, ^ -> ? ]], auto -> [[ !B-auto, ^ -> ? ]] ]]'
      result: '[[ n -> !e ]]'
      where:
        - meta: '!B-spliced'
          function: splice
          args:
            - '!B-cps'
            - 'Φ.hone.emit'
            - '!B-auto'
        - meta: '!e'
          function: size
          args: ['!B-spliced']
