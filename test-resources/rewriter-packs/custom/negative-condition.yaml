---
input: '[[x -> Q.y]].z'
output: |-
  Φ.z
rules:
  custom:
    - name: negative-condition
      pattern: '[[!B]].!t'
      result: 'Q.!t'
      when:
        not:
          in:
            - '!t'
            - '!B'
