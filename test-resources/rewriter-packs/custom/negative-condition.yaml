---
input: '{[[x -> Q.y]].z}'
output: |-
  Φ ↦ Φ.z
rules:
  custom:
    - name: negative-condition
      pattern: '[[!B0]].!a0'
      result: 'Q.!a0'
      when:
        not:
          in:
            - '!a0'
            - '!B0'
