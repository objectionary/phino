---
input: '{[[x -> Q.y]].z}'
output: |-
  Φ ↦ Φ.z
rules:
  custom:
    - name: negative-condition
      match: '[[!B]].!t'
      result: 'Q.!t'
      when:
        not:
          in:
            - '!t'
            - '!B'
