---
# A 'where' extension may omit the 'args' key entirely; it defaults to an
# empty list. 'random-tau' takes no arguments, so it is written argless.
name: where-without-args
pattern: |
  [[ x -> !e ]]
result: |
  [[ x -> !e, !t -> [[ ]], ^ -> ? ]]
where:
  - meta: '!t'
    function: random-tau
