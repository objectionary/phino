---
name: when
match: 'Q.!t'
result: 'Q.x'
when:
  not:
    and:
      - or:
          - and:
              - in:
                  - '!t1'
                  - '!B'
              - eq:
                  - '!t'
                  - '^'
      - or:
          - and:
              - in:
                  - '^'
                  - '!B1'
