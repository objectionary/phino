---
# The application of a formation is a copy-redex, so '!e' is not in normal
# form. Only a normal form may be absolute, so the condition must not hold.
failure: true
expression: '[[ x -> [[ y -> ? ]](y -> Q.z) ]]'
pattern: '[[ x -> !e ]]'
condition:
  absolute: '!e'
