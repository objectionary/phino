---
# yamllint disable rule:line-length
# Here we use macos-14-large as x86-64 arch instead of macos-15-intel
# because of the bug in haskell-actions/setup plugin.
# For more details see this: https://github.com/haskell-actions/setup/issues/77
name: Release binary to S3
'on':
  push:
    tags:
      - '*'
jobs:
  build-and-release:
    strategy:
      matrix:
        os: [macos-15, ubuntu-22.04, macos-14-large, windows-2022]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up GHC and Cabal
        uses: haskell-actions/setup@v2.10.3
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.12.1.0'
      - name: Cache Cabal build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.ghcup
            ~/.cabal/packages
            ~/.cabal/store
            ~/.ghc
            dist-newstyle
          key: ${{ runner.os }}-${{ runner.arch }}-cabal-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cabal-
      - name: Set up msys2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: libxml2
      - name: Add msys2 to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Build
        run: |
          cabal update
          cabal build
      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-release
          cp "$(cabal list-bin phino)" dist-release/phino
          chmod +x dist-release/phino
      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          $bin = (cabal list-bin phino).Trim()
          Copy-Item $bin dist-release\phino.exe
      - name: Upload phino binary to Amazon S3
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.S3_KEY }}
          aws-secret-access-key: ${{ secrets.S3_SECRET }}
          aws-region: ${{ secrets.S3_REGION }}
      - name: Upload phino binary to S3
        run: |
          aws s3 cp dist-release/${{ runner.os == 'Windows' && 'phino.exe' || 'phino' }} s3://${{ secrets.S3_BUCKET }}/releases/${{ matrix.os }}/phino-0.${{ github.ref_name }}${{ runner.os == 'Windows' && '.exe' || '' }} --acl public-read
      - name: Upload as phino-latest
        run: |
          aws s3 cp dist-release/${{ runner.os == 'Windows' && 'phino.exe' || 'phino' }} s3://${{ secrets.S3_BUCKET }}/releases/${{ matrix.os }}/phino-latest${{ runner.os == 'Windows' && '.exe' || '' }} --acl public-read
