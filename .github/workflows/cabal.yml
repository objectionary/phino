---
# yamllint disable rule:line-length
name: cabal
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  cabal:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        ghc: ['9.8.4']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - id: setup
        uses: haskell-actions/setup@v2.10.3
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: '3.12.1.0'
      - uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup.outputs.ghc-path }}
            ${{ steps.setup.outputs.cabal-path }}
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc${{ matrix.ghc }}-cabal-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-ghc${{ matrix.ghc }}-cabal-
      # - if: runner.os == 'Linux'
      #   name: Install Linux dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libxml2-utils
      # - if: runner.os == 'macOS'
      #   name: Install macOS dependencies
      #   run: |
      #     brew install libxml2 tree coreutils make
      #     echo "PATH=/opt/homebrew/opt/make/libexec/gnubin:${PATH}" >> "${GITHUB_ENV}"
      # - if: runner.os == 'Windows'
      #   name: Install Windows dependencies
      #   uses: msys2/setup-msys2@v2
      #   with:
      #     update: true
      #     install: libxml2
      # - if: runner.os == 'Windows'
      #   shell: pwsh
      #   run: echo "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
      - run: cabal update
      - run: cabal build all --enable-tests
      - run: cabal test all --test-show-details=direct